<app-page-banner
  eyebrow="Stay With Us"
  title="Rooms & Suites"
  subtitle="Six ways to wake up to the ocean — from garden retreats to beachfront villas."
></app-page-banner>

<section class="section" aria-label="Available rooms and suites">
  <div class="container">
    <div class="row g-4">
      <div class="col-xl-4 col-md-6" *ngFor="let room of rooms">
        <app-room-card [room]="room"></app-room-card>
      </div>
    </div>
  </div>
</section>
