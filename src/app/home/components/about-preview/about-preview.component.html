<section class="section" aria-labelledby="about-preview-title">
  <div class="container">
    <div class="row align-items-center g-4 g-lg-5">
      <div class="col-lg-6">
        <img
          ngSrc="assets/images/about/about-resort-lobby.jpg"
          alt="Open-air resort lobby and pool pavilion glowing warmly at dusk"
          width="1600"
          height="1067"
          class="about-preview__image"
        />
      </div>
      <div class="col-lg-6">
        <app-section-header
          align="left"
          eyebrow="Welcome to Wayanad Resorts"
          title="A Quieter Kind of Luxury"
          subtitle="Tucked along a protected bay, Wayanad Resorts pairs understated elegance with genuine, unhurried hospitality."
        ></app-section-header>
        <ul class="feature-list">
          <li *ngFor="let feature of features">
            <i [class]="feature.icon" aria-hidden="true"></i>
            <div>
              <h4>{{ feature.title }}</h4>
              <p class="text-muted-soft">{{ feature.text }}</p>
            </div>
          </li>
        </ul>
        <a routerLink="/about" class="btn-resort btn-resort--secondary">More About Us</a>
      </div>
    </div>
  </div>
</section>
